name: Deploy Alpha Compose production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      import_existing_firestore:
        description: Import an existing untracked default Firestore database into Terraform state
        required: false
        default: false
        type: boolean
      allow_destructive_terraform:
        description: Apply a reviewed Terraform plan containing delete or replacement actions
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  PROJECT_ID: animated-graph-cloud-prod-jp
  PROJECT_NUMBER: "488013150738"
  REGION: europe-central2
  REPOSITORY: containers
  SERVICE: agg-api
  OVERLAY_SERVICE: agg-overlay
  DURABLE_JOB: agg-renderer
  SMOKE_JOB: agg-renderer-smoke
  DEPLOYER_SERVICE_ACCOUNT: agg-github-deployer@animated-graph-cloud-prod-jp.iam.gserviceaccount.com
  API_SERVICE_ACCOUNT: agg-api@animated-graph-cloud-prod-jp.iam.gserviceaccount.com
  RENDERER_SERVICE_ACCOUNT: agg-renderer@animated-graph-cloud-prod-jp.iam.gserviceaccount.com
  OWNER_EMAIL: me@jamiep.org
  ADMIN_EMAILS: me@jamiep.org;bartoszjakubowiak@gmail.com
  EARLY_ACCESS_SENDER: Alpha Compose <early-access@alphacompose.com>
  EARLY_ACCESS_RECIPIENT: me@jamiep.org
  PUBLIC_BASE_URL: https://alphacompose.com
  DAILY_SUBMISSION_LIMIT: "100"
  MONTHLY_BUDGET_MINOR_UNITS: "40000"
  PREVIEW_RESERVATION_MINOR_UNITS: "125"
  RENDER_RESERVATION_MINOR_UNITS: "125"

jobs:
  development-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require protected main ref
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Await same-commit development success
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          api_url="$GITHUB_API_URL/repos/$EXPECTED_REPOSITORY/actions/workflows/deploy.yml/runs?branch=main&per_page=100"
          response_file="$RUNNER_TEMP/development-runs.json"
          for attempt in $(seq 1 120); do
            curl --fail --silent --show-error \
              --retry 3 \
              --retry-all-errors \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$api_url" >"$response_file"
            if bash script/require_development_success.sh \
              "$EXPECTED_SHA" "$EXPECTED_REPOSITORY" <"$response_file"; then
              exit 0
            else
              gate_status=$?
            fi
            if [ "$gate_status" -ne 75 ]; then
              exit "$gate_status"
            fi
            if [ "$attempt" -eq 120 ]; then
              echo "::error title=Development gate timed out::No successful development deployment was found for $EXPECTED_SHA. Rerun deploy.yml on main, then manually rerun this production workflow on main."
              exit 1
            fi
            sleep 30
          done

  deploy:
    runs-on: ubuntu-latest
    needs: development-gate
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify pushed commit
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          if [[ ! "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "github.sha must be an exact full 40-character lowercase commit SHA." >&2
            exit 2
          fi
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"

      - name: Build immutable release candidate
        env:
          IMAGE_TAG: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/animated-graph-cloud:${{ github.sha }}
        run: |
          docker build --tag "$IMAGE_TAG" .
          test/container_smoke.sh "$IMAGE_TAG"

      - name: Scan release candidate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/animated-graph-cloud:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - id: auth
        name: Authenticate through production WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/animated-graph-cloud
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          version: ">= 541.0.0"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - id: terraform-context
        name: Discover current Terraform release inputs
        run: |
          set -euo pipefail
          service_url="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')"
          renderer_image="$(gcloud run jobs describe "$DURABLE_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(spec.template.spec.template.spec.containers[0].image)')"
          if [ -z "$service_url" ] || [ -z "$renderer_image" ]; then
            echo "::error title=Terraform bootstrap required::Production Cloud Run resources are missing. Follow docs/production-runbook.md before running automatic deployment."
            exit 1
          fi
          echo "service_url=$service_url" >>"$GITHUB_OUTPUT"
          echo "renderer_image=$renderer_image" >>"$GITHUB_OUTPUT"

      - name: Plan and apply production Terraform
        env:
          ALLOW_DESTRUCTIVE_TERRAFORM: ${{ inputs.allow_destructive_terraform }}
          API_SERVICE_URL: ${{ steps.terraform-context.outputs.service_url }}
          IMPORT_EXISTING_FIRESTORE: ${{ inputs.import_existing_firestore }}
          RENDERER_IMAGE: ${{ steps.terraform-context.outputs.renderer_image }}
        run: |
          set -euo pipefail
          terraform -chdir=infra/prod init -input=false

          state_resources="$(terraform -chdir=infra/prod state list)"
          firestore_address='module.application.google_firestore_database.default'
          if ! grep -Fxq "$firestore_address" <<<"$state_resources"; then
            firestore_error="$RUNNER_TEMP/firestore-describe-error"
            if gcloud firestore databases describe \
              --database='(default)' \
              --project="$PROJECT_ID" \
              >/dev/null 2>"$firestore_error"; then
              {
                echo "## Terraform import required"
                echo
                echo "The default production Firestore database exists but is not tracked in Terraform state."
                echo "Do not delete it. Manually dispatch this workflow with \`import_existing_firestore\` enabled."
              } >>"$GITHUB_STEP_SUMMARY"
              if [ "$IMPORT_EXISTING_FIRESTORE" != "true" ]; then
                echo "::error title=Terraform import required::The existing default Firestore database is absent from Terraform state. Re-run this workflow manually with import_existing_firestore enabled."
                exit 1
              fi
              terraform -chdir=infra/prod import \
                -input=false \
                -var="renderer_image=$RENDERER_IMAGE" \
                -var="api_service_url=$API_SERVICE_URL" \
                "$firestore_address" \
                "projects/$PROJECT_ID/databases/(default)"
            elif ! grep -Eq 'NOT_FOUND|does not exist' "$firestore_error"; then
              cat "$firestore_error" >&2
              exit 1
            fi
          fi

          plan_path="$RUNNER_TEMP/prod.tfplan"
          plan_json="$RUNNER_TEMP/prod.tfplan.json"
          terraform -chdir=infra/prod plan \
            -input=false \
            -lock-timeout=5m \
            -out="$plan_path" \
            -var="renderer_image=$RENDERER_IMAGE" \
            -var="api_service_url=$API_SERVICE_URL"
          terraform -chdir=infra/prod show -json "$plan_path" >"$plan_json"

          creates="$(jq '[.resource_changes[]? | select(.change.actions == ["create"])] | length' "$plan_json")"
          updates="$(jq '[.resource_changes[]? | select(.change.actions == ["update"])] | length' "$plan_json")"
          deletes="$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' "$plan_json")"
          {
            echo "## Production Terraform plan"
            echo
            echo "- Create: $creates"
            echo "- Update: $updates"
            echo "- Delete or replace: $deletes"
            echo
            echo "| Resource | Actions |"
            echo "| --- | --- |"
            jq -r '.resource_changes[]? | select(.change.actions != ["no-op"]) | "| `\(.address)` | `\(.change.actions | join(" -> "))` |"' "$plan_json"
          } >>"$GITHUB_STEP_SUMMARY"

          if [ "$deletes" -gt 0 ] && [ "$ALLOW_DESTRUCTIVE_TERRAFORM" != "true" ]; then
            echo "::error title=Destructive Terraform plan blocked::Review the plan summary, then manually dispatch this workflow with allow_destructive_terraform enabled if the deletion or replacement is intended."
            exit 1
          fi

          terraform -chdir=infra/prod apply -input=false "$plan_path"

      - name: Verify production Picker API key
        run: |
          set -euo pipefail
          key_resource="$({
            gcloud secrets versions access latest \
              --project="$PROJECT_ID" \
              --secret=picker-api-key
          } | curl --fail --silent --show-error --get \
            --header "Authorization: Bearer $(gcloud auth print-access-token)" \
            --data-urlencode 'keyString@-' \
            'https://apikeys.googleapis.com/v2/keys:lookupKey' |
            jq --raw-output '.name // empty')"
          expected_key_prefix="projects/$PROJECT_NUMBER/locations/global/keys/"
          case "$key_resource" in
            "$expected_key_prefix"*) ;;
            *)
              echo "picker-api-key is not owned by the production project" >&2
              exit 1
              ;;
          esac
          api_targets="$(gcloud services api-keys describe "$key_resource" \
            --project="$PROJECT_ID" \
            --format='json(restrictions)')"
          jq -e '
            (.restrictions | keys | sort) == ["apiTargets"] and
            (.restrictions.apiTargets | length == 1) and
            (.restrictions.apiTargets[0].service == "picker.googleapis.com")
          ' <<<"$api_targets" >/dev/null

      - name: Verify enabled Resend secret version
        run: |
          set -euo pipefail
          if ! resend_secret_state="$(gcloud secrets versions describe latest \
            --project="$PROJECT_ID" \
            --secret=resend-api-key \
            --format='value(state)')"; then
            echo "::error title=Resend bootstrap required::The production Terraform apply created the secret container and IAM. Add an enabled production resend-api-key version, then rerun this workflow through workflow_dispatch."
            exit 1
          fi
          if ! test "$resend_secret_state" = "ENABLED"; then
            echo "::error title=Resend bootstrap required::Enable a production resend-api-key version, then rerun this workflow through workflow_dispatch."
            exit 1
          fi

      - id: image
        name: Push and resolve immutable image digest
        env:
          IMAGE_TAG: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/animated-graph-cloud:${{ github.sha }}
        run: |
          gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
          docker push "$IMAGE_TAG"
          digest="$(gcloud artifacts docker images describe "$IMAGE_TAG" --format='value(image_summary.digest)')"
          test -n "$digest"
          echo "uri=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/animated-graph-cloud@$digest" >>"$GITHUB_OUTPUT"

      - name: Deploy private API candidate
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.uri }}
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE_DIGEST" \
            --service-account "$API_SERVICE_ACCOUNT" \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --concurrency 80 \
            --timeout 300 \
            --cpu-boost \
            --min 0 \
            --max 2 \
            --no-allow-unauthenticated \
            --quiet

      - name: Deploy private overlay candidate
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.uri }}
        run: |
          gcloud run deploy "$OVERLAY_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE_DIGEST" \
            --service-account "$API_SERVICE_ACCOUNT" \
            --port 8080 \
            --cpu 8 \
            --memory 32Gi \
            --concurrency 1 \
            --timeout 3600 \
            --execution-environment gen2 \
            --cpu-boost \
            --min 0 \
            --max 2 \
            --no-allow-unauthenticated \
            --quiet

      - name: Execute isolated renderer smoke
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.uri }}
        run: |
          gcloud run jobs deploy "$SMOKE_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE_DIGEST" \
            --service-account "$RENDERER_SERVICE_ACCOUNT" \
            --args clojure.main,-m,agg.renderer.main \
            --tasks 1 \
            --max-retries 0 \
            --task-timeout 5m \
            --cpu 1 \
            --memory 512Mi \
            --quiet
          gcloud run jobs execute "$SMOKE_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --wait

      - id: service-url
        name: Discover private API origin
        run: |
          service_url="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')"
          test -n "$service_url"
          echo "url=$service_url" >>"$GITHUB_OUTPUT"

      - id: overlay-service-url
        name: Discover private overlay origin
        run: |
          service_url="$(gcloud run services describe "$OVERLAY_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')"
          test -n "$service_url"
          echo "url=$service_url" >>"$GITHUB_OUTPUT"

      - name: Configure API and overlay production runtimes
        env:
          CLOUD_RUN_SERVICE_URL: ${{ steps.service-url.outputs.url }}
        run: |
          gcloud run services update "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --remove-env-vars "AGG_MONTHLY_BUDGET_CENTS,AGG_PREVIEW_RESERVATION_CENTS,AGG_RENDER_RESERVATION_CENTS" \
            --update-env-vars "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,AGG_SERVICE_PROFILE=api,AGG_JOB_LIFECYCLE_ENABLED=true,AGG_AUTH_ENABLED=true,AGG_REGION=$REGION,AGG_TEMPORARY_BUCKET=$PROJECT_ID-temporary,AGG_TASKS_QUEUE=agg-render,AGG_TASKS_SERVICE_ACCOUNT=agg-tasks@$PROJECT_ID.iam.gserviceaccount.com,AGG_SCHEDULER_SERVICE_ACCOUNT=agg-scheduler@$PROJECT_ID.iam.gserviceaccount.com,AGG_RENDERER_JOB=$DURABLE_JOB,AGG_DISPATCHER_URL=$CLOUD_RUN_SERVICE_URL,AGG_PUBLIC_BASE_URL=$PUBLIC_BASE_URL,AGG_OWNER_EMAIL=$OWNER_EMAIL,AGG_ADMIN_EMAILS=$ADMIN_EMAILS,AGG_PICKER_APP_ID=$PROJECT_NUMBER,AGG_EARLY_ACCESS_SENDER=$EARLY_ACCESS_SENDER,AGG_EARLY_ACCESS_RECIPIENT=$EARLY_ACCESS_RECIPIENT,AGG_DAILY_SUBMISSION_LIMIT=$DAILY_SUBMISSION_LIMIT,AGG_MONTHLY_BUDGET_MINOR_UNITS=$MONTHLY_BUDGET_MINOR_UNITS,AGG_PREVIEW_RESERVATION_MINOR_UNITS=$PREVIEW_RESERVATION_MINOR_UNITS,AGG_RENDER_RESERVATION_MINOR_UNITS=$RENDER_RESERVATION_MINOR_UNITS" \
            --update-secrets "AGG_OAUTH_CLIENT_CREDENTIALS=oauth-client-secret:latest,AGG_SESSION_KEY=session-key:latest,AGG_PICKER_API_KEY=picker-api-key:latest,AGG_TOKEN_HASH_PEPPER=token-hash-pepper:latest,AGG_RESEND_API_KEY=resend-api-key:latest" \
            --quiet
          gcloud run services update "$OVERLAY_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --remove-env-vars "AGG_MONTHLY_BUDGET_CENTS,AGG_PREVIEW_RESERVATION_CENTS,AGG_RENDER_RESERVATION_CENTS" \
            --update-env-vars "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,AGG_SERVICE_PROFILE=overlay,AGG_JOB_LIFECYCLE_ENABLED=true,AGG_AUTH_ENABLED=true,AGG_REGION=$REGION,AGG_TEMPORARY_BUCKET=$PROJECT_ID-temporary,AGG_TASKS_QUEUE=agg-render,AGG_TASKS_SERVICE_ACCOUNT=agg-tasks@$PROJECT_ID.iam.gserviceaccount.com,AGG_SCHEDULER_SERVICE_ACCOUNT=agg-scheduler@$PROJECT_ID.iam.gserviceaccount.com,AGG_RENDERER_JOB=$DURABLE_JOB,AGG_DISPATCHER_URL=$CLOUD_RUN_SERVICE_URL,AGG_PUBLIC_BASE_URL=$PUBLIC_BASE_URL,AGG_OWNER_EMAIL=$OWNER_EMAIL,AGG_ADMIN_EMAILS=$ADMIN_EMAILS,AGG_PICKER_APP_ID=$PROJECT_NUMBER,AGG_DAILY_SUBMISSION_LIMIT=$DAILY_SUBMISSION_LIMIT,AGG_MONTHLY_BUDGET_MINOR_UNITS=$MONTHLY_BUDGET_MINOR_UNITS,AGG_PREVIEW_RESERVATION_MINOR_UNITS=$PREVIEW_RESERVATION_MINOR_UNITS,AGG_RENDER_RESERVATION_MINOR_UNITS=$RENDER_RESERVATION_MINOR_UNITS" \
            --update-secrets "AGG_OAUTH_CLIENT_CREDENTIALS=oauth-client-secret:latest,AGG_SESSION_KEY=session-key:latest,AGG_PICKER_API_KEY=picker-api-key:latest,AGG_TOKEN_HASH_PEPPER=token-hash-pepper:latest" \
            --quiet

      - id: api-health-auth
        name: Mint API origin identity token through WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/animated-graph-cloud
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.service-url.outputs.url }}
          id_token_include_email: true

      - id: overlay-health-auth
        name: Mint overlay origin identity token through WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/animated-graph-cloud
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.overlay-service-url.outputs.url }}
          id_token_include_email: true

      - name: Verify private API and overlay candidates
        env:
          CLOUD_RUN_SERVICE_URL: ${{ steps.service-url.outputs.url }}
          CLOUD_RUN_ID_TOKEN: ${{ steps.api-health-auth.outputs.id_token }}
          OVERLAY_RUN_SERVICE_URL: ${{ steps.overlay-service-url.outputs.url }}
          OVERLAY_RUN_ID_TOKEN: ${{ steps.overlay-health-auth.outputs.id_token }}
        run: |
          api_health="$(curl --fail --silent --show-error \
            --retry 5 --retry-all-errors \
            --header "Authorization: Bearer $CLOUD_RUN_ID_TOKEN" \
            "$CLOUD_RUN_SERVICE_URL/health")"
          test "$api_health" = '{"status":"ok"}'
          overlay_health="$(curl --fail --silent --show-error \
            --retry 5 --retry-all-errors \
            --header "Authorization: Bearer $OVERLAY_RUN_ID_TOKEN" \
            "$OVERLAY_RUN_SERVICE_URL/health")"
          test "$overlay_health" = '{"status":"ok"}'
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $CLOUD_RUN_ID_TOKEN" \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "$CLOUD_RUN_SERVICE_URL/v1/overlay")" = 404
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer $OVERLAY_RUN_ID_TOKEN" \
            "$OVERLAY_RUN_SERVICE_URL/privacy")" = 404
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "X-Serverless-Authorization: Bearer $OVERLAY_RUN_ID_TOKEN" \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "$OVERLAY_RUN_SERVICE_URL/v1/overlay")" = 401

      - name: Restore deployment credentials after candidate verification
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/animated-graph-cloud
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Reconcile production runtimes through Terraform
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.uri }}
          CLOUD_RUN_SERVICE_URL: ${{ steps.service-url.outputs.url }}
        run: |
          terraform -chdir=infra/prod plan -input=false \
            -var="renderer_image=$IMAGE_DIGEST" \
            -var="api_service_url=$CLOUD_RUN_SERVICE_URL" \
            -target=module.application.google_cloud_run_v2_service.api \
            -target=module.application.google_cloud_run_v2_service.overlay \
            -target=module.application.google_cloud_run_v2_job.renderer \
            -out="$RUNNER_TEMP/prod-runtime.tfplan"
          terraform -chdir=infra/prod apply -input=false \
            "$RUNNER_TEMP/prod-runtime.tfplan"

      - name: Verify reconciled private services
        env:
          CLOUD_RUN_SERVICE_URL: ${{ steps.service-url.outputs.url }}
          CLOUD_RUN_ID_TOKEN: ${{ steps.api-health-auth.outputs.id_token }}
          OVERLAY_RUN_SERVICE_URL: ${{ steps.overlay-service-url.outputs.url }}
          OVERLAY_RUN_ID_TOKEN: ${{ steps.overlay-health-auth.outputs.id_token }}
        run: |
          test "$(curl --fail --silent --show-error \
            --retry 5 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer $CLOUD_RUN_ID_TOKEN" \
            "$CLOUD_RUN_SERVICE_URL/health")" = '{"status":"ok"}'
          test "$(curl --fail --silent --show-error \
            --retry 5 --retry-all-errors \
            --header "X-Serverless-Authorization: Bearer $OVERLAY_RUN_ID_TOKEN" \
            "$OVERLAY_RUN_SERVICE_URL/health")" = '{"status":"ok"}'
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "X-Serverless-Authorization: Bearer $CLOUD_RUN_ID_TOKEN" \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "$CLOUD_RUN_SERVICE_URL/v1/overlay")" = 404
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "X-Serverless-Authorization: Bearer $OVERLAY_RUN_ID_TOKEN" \
            "$OVERLAY_RUN_SERVICE_URL/privacy")" = 404
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "X-Serverless-Authorization: Bearer $OVERLAY_RUN_ID_TOKEN" \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "$OVERLAY_RUN_SERVICE_URL/v1/overlay")" = 401

      - name: Restore public invokers
        run: |
          gcloud run services add-iam-policy-binding "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --member=allUsers \
            --role=roles/run.invoker \
            --quiet
          gcloud run services add-iam-policy-binding "$OVERLAY_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --member=allUsers \
            --role=roles/run.invoker \
            --quiet

      - name: Publish pinned Firebase Hosting routes
        run: >-
          npx --yes firebase-tools@15.24.0 deploy
          --only hosting
          --project "$PROJECT_ID"
          --non-interactive

      - name: Verify public release
        run: |
          test "$(curl --fail --silent --show-error --retry 5 --retry-all-errors "$PUBLIC_BASE_URL/health")" = '{"status":"ok"}'
          test "$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "$PUBLIC_BASE_URL/v1/overlay")" = 401
          curl --fail --silent --show-error "$PUBLIC_BASE_URL/privacy" | grep -q 'Privacy policy'
          curl --fail --silent --show-error "$PUBLIC_BASE_URL/terms" | grep -q 'Terms of service'
          contract_headers="$RUNNER_TEMP/openapi.headers"
          contract="$(curl --fail --silent --show-error --retry 5 --retry-all-errors \
            --dump-header "$contract_headers" "$PUBLIC_BASE_URL/openapi.yaml")"
          grep -q '^openapi: 3.1.0$' <<<"$contract"
          grep -iq '^content-type: application/yaml; charset=utf-8' "$contract_headers"

      - name: Record release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.uri }}
        run: |
          {
            echo "## Alpha Compose production deployment"
            echo
            echo "- Ref: ${{ github.ref }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Image: $IMAGE_DIGEST"
            echo "- Domain: $PUBLIC_BASE_URL"
            echo "- Administrators: $ADMIN_EMAILS"
            echo "- Terraform: planned and applied before candidate promotion"
            echo "- Manual acceptance remains recorded separately"
          } >>"$GITHUB_STEP_SUMMARY"
