name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clojure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.5.1654
          clj-kondo: 2026.05.25
      - run: clj-kondo --lint src test build.clj
      - run: clojure -M:test
      - run: clojure -T:build uber

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - run: terraform fmt -check -recursive
      - run: terraform -chdir=infra/dev init -backend=false -input=false
      - run: terraform -chdir=infra/dev validate

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build --tag animated-graph-cloud:ci .
      - run: test/container_smoke.sh animated-graph-cloud:ci
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: animated-graph-cloud:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
